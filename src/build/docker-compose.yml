version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: phantom_postgres
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: phantom_developer
      POSTGRES_PASSWORD: phantom_password
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom_developer -d main_db -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: phantom_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phantom_backend_app
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
